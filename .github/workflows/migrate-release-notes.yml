name: Migrate Release Notes

on:
  push:
    branches: [the_way_to_0.3.x]
    paths: [.github/workflows/migrate-release-notes.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: the_way_to_0.3.x
          fetch-depth: 0

      - name: Move Release Notes
        shell: python
        run: |
          from pathlib import Path

          path = Path('Chilkat.au3')
          raw = path.read_bytes()
          newline = b'\r\n' if b'\r\n' in raw else b'\n'
          text = raw.decode('utf-8')

          start_marker = '#Region ; Release Notes'
          end_marker = '#EndRegion ; Release Notes'
          if text.count(start_marker) != 1 or text.count(end_marker) != 1:
              raise SystemExit('Expected exactly one complete Release Notes region.')

          start = text.index(start_marker)
          end = text.index(end_marker, start) + len(end_marker)
          region = text[start:end]
          if '#cs' not in region or '#ce' not in region:
              raise SystemExit('Release Notes comment block is incomplete.')

          body = region.split('#cs', 1)[1].rsplit('#ce', 1)[0].strip('\r\n')
          notice = (
              '<!-- AI_ASSISTED_DOCUMENTATION_NOTICE -->\n'
              '> **AI-assisted documentation:** This document is developed with assistance from ChatGPT AI, '
              'reviewed by mLipok, and based on Chilkat.au3 version/tag '
              '`v0.3.0 BETA - Work in progress`.\n'
          )
          md = (
              '# Chilkat.au3 Release Notes\n\n' + notice + '\n'
              'This file is the central Release Notes history for the Chilkat.au3 UDF.\n\n'
              '## Maintenance policy\n\n'
              '- Whenever a new UDF function is added, update the current release entry in the same change.\n'
              '- While a version is under development, revise and extend its latest entry instead of creating duplicates.\n'
              '- Before a final release, update the version/tag in the AI-assisted notice in every Markdown file.\n\n'
              '## Release history\n\n```text\n' + body + '\n```\n'
          )
          Path('RELEASE_NOTES.md').write_text(md, encoding='utf-8', newline='\n')

          replacement = '; Release Notes .: See RELEASE_NOTES.md'
          updated = text[:start] + replacement + text[end:]
          path.write_bytes(updated.replace('\n', newline.decode()).encode('utf-8'))

          workflow = Path('.github/workflows/migrate-release-notes.yml')
          workflow.unlink()

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Chilkat.au3 RELEASE_NOTES.md .github/workflows/migrate-release-notes.yml
          git commit -m "Move Release Notes to Markdown"
          git push origin HEAD:the_way_to_0.3.x
